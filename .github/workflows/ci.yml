name: Lint
"on":
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - "*"
jobs:
  tflint:
    name: Build & Test
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macOS-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        name: Checkout source code
      - name: System info
        shell: bash
        run: |
          uname -a || true
          arch || true
          file $(which tflint) || true
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        name: Cache plugin dir
        with:
          path: ~/.tflint.d/plugins
          key: tflint-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.tflint.hcl') }}
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a # v6.3.0 
      - name: Show version
        run: tflint --version
      - name: Init TFLint
        run: tflint --init
        env:
          TF_LOG: DEBUG
      - name: Debug plugin path
        shell: bash
        run: |
          ls -la ~/.tflint.d/plugins/github.com/terraform-linters/tflint-ruleset-aws/*/ || true
          file ~/.tflint.d/plugins/github.com/terraform-linters/tflint-ruleset-aws/*/tflint-ruleset-aws || true
      - name: Run TFLint
        run: tflint -f compact
